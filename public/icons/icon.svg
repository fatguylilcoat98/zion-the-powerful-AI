<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <dropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>

  <!-- Mountain Peak (representing strength/grounding) -->
  <path d="M 180 350 L 256 200 L 332 350 Z" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- ZION Text -->
  <text x="256" y="280" text-anchor="middle" fill="url(#textGradient)" font-family="Arial, sans-serif" font-size="72" font-weight="bold" filter="url(#shadow)">ZION</text>

  <!-- Subtitle -->
  <text x="256" y="320" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="24" font-weight="300">Personal AI</text>

  <!-- Decorative Elements -->
  <circle cx="200" cy="180" r="3" fill="rgba(255,255,255,0.6)" opacity="0.8"/>
  <circle cx="312" cy="160" r="2" fill="rgba(255,255,255,0.6)" opacity="0.6"/>
  <circle cx="280" cy="140" r="2" fill="rgba(255,255,255,0.6)" opacity="0.7"/>
  <circle cx="240" cy="170" r="1.5" fill="rgba(255,255,255,0.6)" opacity="0.5"/>
</svg>