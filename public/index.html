<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion - Your Personal AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            margin-bottom: 5px;
            font-size: 1.8em;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #e9ecef;
            font-size: 0.85em;
            color: #6c757d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .voice-toggle-container {
            display: flex;
            align-items: center;
        }

        .voice-toggle {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.8em;
        }

        .voice-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .voice-toggle-slider {
            position: relative;
            width: 40px;
            height: 20px;
            background-color: #ccc;
            border-radius: 20px;
            transition: background-color 0.3s;
            margin-right: 8px;
        }

        .voice-toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .voice-toggle input:checked + .voice-toggle-slider {
            background-color: #667eea;
        }

        .voice-toggle input:checked + .voice-toggle-slider:before {
            transform: translateX(20px);
        }

        .voice-toggle-label {
            color: #6c757d;
            font-weight: 500;
        }

        .voice-toggle input:checked + .voice-toggle-slider + .voice-toggle-label {
            color: #667eea;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
        }

        .message.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.zion {
            background: #f1f3f4;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-style: italic;
            font-size: 0.9em;
            border-radius: 10px;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            align-items: center;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .voice-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .voice-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .voice-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .voice-button.recording {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.6);
        }

        .voice-button.processing {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);
        }

        .voice-button.listening {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .chat-input button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .voice-status {
            font-size: 0.8em;
            color: #6c757d;
            margin-top: 5px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .voice-status.processing {
            color: #667eea;
            font-weight: 500;
        }

        .voice-status.success {
            color: #28a745;
            font-weight: 500;
        }

        .voice-status.error {
            color: #dc3545;
            font-weight: 500;
        }

        .audio-player {
            display: none;
            margin: 10px 0;
            width: 100%;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #f1f3f4;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.5s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .welcome-message {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 95%;
                height: 95vh;
                border-radius: 15px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💜 Zion</h1>
            <p>Your Personal AI Assistant</p>
        </div>

        <div class="status-bar" id="statusBar">
            <span id="statusText">Connecting to Zion...</span>
            <div class="voice-toggle-container">
                <label class="voice-toggle">
                    <input type="checkbox" id="voiceToggle" checked>
                    <span class="voice-toggle-slider"></span>
                    <span class="voice-toggle-label">🔊 Voice</span>
                </label>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <p>Welcome to your personal AI assistant! 🤖</p>
                <p>Zion is here to chat, help, and get to know you.</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span style="margin-left: 10px;">Zion is typing...</span>
        </div>

        <div class="chat-input">
            <button id="voiceButton" class="voice-button" title="Click to start/stop voice recording" disabled>
                🎤
            </button>
            <input type="text" id="messageInput" placeholder="Type your message or record with microphone..." disabled>
            <button id="sendButton" disabled>Send</button>
        </div>

        <div class="voice-status" id="voiceStatus" style="display: none;"></div>
        <audio id="audioPlayer" class="audio-player" controls></audio>
    </div>

    <script>
        class ZionChat {
            constructor() {
                this.messageInput = document.getElementById('messageInput');
                this.sendButton = document.getElementById('sendButton');
                this.voiceButton = document.getElementById('voiceButton');
                this.chatMessages = document.getElementById('chatMessages');
                this.statusBar = document.getElementById('statusText');
                this.typingIndicator = document.getElementById('typingIndicator');
                this.voiceStatus = document.getElementById('voiceStatus');
                this.audioPlayer = document.getElementById('audioPlayer');
                this.voiceToggle = document.getElementById('voiceToggle');

                // Voice recording state
                this.mediaRecorder = null;
                this.audioChunks = [];
                this.isRecording = false;
                this.isProcessing = false;
                this.voiceEnabled = false;
                this.voiceOutputEnabled = true; // Controls whether Zion speaks back

                this.init();
            }

            async init() {
                this.loadVoicePreference();
                this.setupEventListeners();
                await this.checkZionStatus();
                await this.checkVoiceCapabilities();
            }

            setupEventListeners() {
                // Text chat
                this.sendButton.addEventListener('click', () => this.sendMessage());
                this.messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                // Voice recording - click to start/stop
                this.voiceButton.addEventListener('click', () => this.toggleRecording());

                // Voice output toggle
                this.voiceToggle.addEventListener('change', () => this.handleVoiceToggle());
            }

            loadVoicePreference() {
                // Load voice output preference from localStorage
                const savedPreference = localStorage.getItem('zionVoiceEnabled');
                if (savedPreference !== null) {
                    this.voiceOutputEnabled = savedPreference === 'true';
                    this.voiceToggle.checked = this.voiceOutputEnabled;
                }
                this.updateVoiceToggleState();
            }

            handleVoiceToggle() {
                this.voiceOutputEnabled = this.voiceToggle.checked;
                localStorage.setItem('zionVoiceEnabled', this.voiceOutputEnabled.toString());
                this.updateVoiceToggleState();

                // Show feedback
                const status = this.voiceOutputEnabled ? 'Voice responses enabled' : 'Voice responses disabled';
                this.showVoiceStatus(`🔊 ${status}`, this.voiceOutputEnabled ? 'success' : 'default');
                setTimeout(() => this.hideVoiceStatus(), 2000);
            }

            updateVoiceToggleState() {
                const label = this.voiceToggle.parentElement.querySelector('.voice-toggle-label');
                if (this.voiceOutputEnabled) {
                    label.textContent = '🔊 Voice On';
                    label.style.color = '#667eea';
                } else {
                    label.textContent = '🔇 Voice Off';
                    label.style.color = '#6c757d';
                }
            }

            async checkZionStatus() {
                try {
                    const response = await fetch('/api/status');
                    const status = await response.json();

                    if (status.name === 'Zion') {
                        this.statusBar.textContent = `Connected to ${status.name} • Ready to chat`;
                        this.enableChat();

                        // Check customization status
                        if (status.customizationStatus && status.customizationStatus.status === 'needs_customization') {
                            this.addSystemMessage(`Hi ${status.humanName}! I see you have ${status.customizationStatus.remainingTodos} sections left to customize in my memory-seed.md file. Feel free to chat with me now, and customize me later!`);
                        } else if (status.customizationStatus && status.customizationStatus.status === 'fully_customized') {
                            this.addSystemMessage(`Hello ${status.humanName}! I'm fully customized and ready for deep conversations!`);
                        }
                    }
                } catch (error) {
                    this.statusBar.textContent = 'Connection error - please refresh';
                    console.error('Status check failed:', error);
                }
            }

            async checkVoiceCapabilities() {
                try {
                    const response = await fetch('/api/zion/voice-status');
                    const voiceStatus = await response.json();

                    this.voiceEnabled = voiceStatus.available;

                    if (this.voiceEnabled) {
                        this.voiceButton.disabled = false;
                        this.voiceButton.title = 'Click to start voice recording';
                        console.log('Voice capabilities enabled');
                    } else {
                        this.voiceButton.disabled = true;
                        this.voiceButton.title = 'Voice not available (OpenAI API key required)';
                        console.warn('Voice capabilities disabled - OpenAI API key not configured');
                    }
                } catch (error) {
                    console.error('Voice status check failed:', error);
                    this.voiceButton.disabled = true;
                    this.voiceButton.title = 'Voice not available';
                }
            }

            enableChat() {
                this.resetVoiceUI();
            }

            toggleRecording() {
                if (this.isProcessing) return;

                if (this.isRecording) {
                    this.stopRecording();
                } else {
                    this.startRecording();
                }
            }

            async startRecording() {
                if (!this.voiceEnabled || this.isRecording || this.isProcessing) return;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });

                    this.audioChunks = [];
                    this.isRecording = true;

                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.audioChunks.push(event.data);
                        }
                    };

                    this.mediaRecorder.start();

                    this.voiceButton.classList.add('listening');
                    this.voiceButton.textContent = '🎙️';
                    this.voiceButton.title = 'Click to stop recording';

                    // Enable submit button and change text for voice mode
                    this.sendButton.textContent = 'Send Voice';
                    this.sendButton.disabled = false;

                    // Disable text input while recording
                    this.messageInput.disabled = true;
                    this.messageInput.placeholder = 'Recording... Click mic to stop or Send Voice to process';

                    this.showVoiceStatus('🎙️ Listening... Click mic to stop or hit Send Voice', 'processing');

                } catch (error) {
                    console.error('Failed to start recording:', error);
                    this.showVoiceStatus('❌ Microphone access denied', 'error');
                    setTimeout(() => this.hideVoiceStatus(), 3000);
                }
            }

            stopRecording() {
                if (!this.isRecording || !this.mediaRecorder) return;

                this.isRecording = false;
                this.mediaRecorder.stop();

                // Stop all tracks to release microphone
                this.mediaRecorder.stream.getTracks().forEach(track => track.stop());

                this.voiceButton.classList.remove('listening');
                this.voiceButton.textContent = '🎤';
                this.voiceButton.title = 'Click to start voice recording';

                // Keep submit button enabled for processing the recording
                this.sendButton.textContent = 'Process Voice';
                this.sendButton.disabled = false;

                // Re-enable text input
                this.messageInput.disabled = false;
                this.messageInput.placeholder = 'Type your message or record with microphone...';

                this.showVoiceStatus('🔊 Recording stopped. Click "Process Voice" to send', 'success');
            }

            async processRecording() {
                if (!this.audioChunks || this.audioChunks.length === 0) {
                    this.resetVoiceUI();
                    this.hideVoiceStatus();
                    this.showVoiceStatus('❌ No recording to process', 'error');
                    setTimeout(() => this.hideVoiceStatus(), 3000);
                    return;
                }

                this.isProcessing = true;
                this.voiceButton.disabled = true;
                this.sendButton.disabled = true;
                this.sendButton.textContent = 'Processing...';
                this.showVoiceStatus('🔄 Processing speech & generating response...', 'processing');

                try {
                    // Create audio blob
                    const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });

                    // Send to parallel voice-chat endpoint for simultaneous processing
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'recording.webm');
                    formData.append('generateSpeech', this.voiceOutputEnabled.toString());

                    this.showTypingIndicator();
                    this.messageInput.disabled = true;
                    this.sendButton.disabled = true;

                    const voiceChatResponse = await fetch('/api/zion/voice-chat', {
                        method: 'POST',
                        body: formData
                    });

                    if (!voiceChatResponse.ok) {
                        throw new Error('Voice processing failed');
                    }

                    const result = await voiceChatResponse.json();

                    if (!result.transcript || result.transcript.trim().length === 0) {
                        this.showVoiceStatus('No speech detected', 'error');
                        setTimeout(() => this.hideVoiceStatus(), 3000);
                        this.resetVoiceButton();
                        this.hideTypingIndicator();
                        this.messageInput.disabled = false;
                        this.sendButton.disabled = false;
                        return;
                    }

                    // Display transcribed text and AI response simultaneously
                    this.addMessage(result.transcript, 'user');
                    this.addMessage(result.response, 'zion');

                    // Play audio response if available and voice is enabled
                    if (result.audio && result.audio.data && this.voiceOutputEnabled) {
                        this.playAudioResponse(result.audio.data);
                    }

                    this.showVoiceStatus(`✓ Text & voice response ready`, 'success');
                    setTimeout(() => this.hideVoiceStatus(), 2000);

                } catch (error) {
                    console.error('Voice processing failed:', error);
                    this.showVoiceStatus('Voice processing failed', 'error');
                    setTimeout(() => this.hideVoiceStatus(), 3000);
                } finally {
                    this.isProcessing = false;
                    this.audioChunks = []; // Clear the recording
                    this.resetVoiceUI();
                    this.hideTypingIndicator();
                }
            }

            resetVoiceButton() {
                this.voiceButton.classList.remove('recording', 'processing', 'listening');
                this.voiceButton.textContent = '🎤';
                this.voiceButton.title = 'Click to start voice recording';
                this.voiceButton.disabled = !this.voiceEnabled;
            }

            resetVoiceUI() {
                this.resetVoiceButton();
                this.sendButton.textContent = 'Send';
                this.sendButton.disabled = false;
                this.messageInput.disabled = false;
                this.messageInput.placeholder = 'Type your message or record with microphone...';
                this.messageInput.focus();
            }

            showVoiceStatus(message, type = 'default') {
                this.voiceStatus.textContent = message;
                this.voiceStatus.style.display = 'block';

                // Reset classes
                this.voiceStatus.classList.remove('processing', 'success', 'error');

                // Add appropriate class
                if (type === 'processing') {
                    this.voiceStatus.classList.add('processing');
                } else if (type === 'success') {
                    this.voiceStatus.classList.add('success');
                } else if (type === 'error') {
                    this.voiceStatus.classList.add('error');
                }
            }

            hideVoiceStatus() {
                this.voiceStatus.style.display = 'none';
                this.voiceStatus.classList.remove('processing', 'success', 'error');
            }

            async sendMessage(generateSpeech = false) {
                // Check if we have a voice recording to process
                if (this.audioChunks && this.audioChunks.length > 0) {
                    await this.processRecording();
                    return;
                }

                // Handle text message
                const message = this.messageInput.value.trim();
                if (!message) return;

                this.addMessage(message, 'user');
                this.messageInput.value = '';
                this.messageInput.disabled = true;
                this.sendButton.disabled = true;
                this.voiceButton.disabled = true;
                this.showTypingIndicator();

                try {
                    // Use Zion-specific chat endpoint
                    const response = await fetch('/api/zion/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message,
                            generateSpeech: (generateSpeech && this.voiceEnabled && this.voiceOutputEnabled)
                        })
                    });

                    const data = await response.json();

                    if (data.response) {
                        this.addMessage(data.response, 'zion');

                        // Play audio response if available and voice is enabled
                        if (data.audio && data.audio.data && this.voiceOutputEnabled) {
                            this.playAudioResponse(data.audio.data);
                        }
                    } else {
                        this.addSystemMessage('Sorry, I had trouble responding. Please try again.');
                    }

                } catch (error) {
                    console.error('Chat error:', error);
                    this.addSystemMessage('Connection error. Please check your connection and try again.');
                } finally {
                    this.hideTypingIndicator();
                    this.hideVoiceStatus();
                    this.messageInput.disabled = false;
                    this.sendButton.disabled = false;
                    this.voiceButton.disabled = !this.voiceEnabled;
                    this.messageInput.focus();
                }
            }

            playAudioResponse(base64Audio) {
                try {
                    // Convert base64 to blob
                    const audioData = atob(base64Audio);
                    const arrayBuffer = new ArrayBuffer(audioData.length);
                    const view = new Uint8Array(arrayBuffer);

                    for (let i = 0; i < audioData.length; i++) {
                        view[i] = audioData.charCodeAt(i);
                    }

                    const audioBlob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    this.audioPlayer.src = audioUrl;
                    this.audioPlayer.style.display = 'block';
                    this.audioPlayer.play();

                    // Clean up URL after playback
                    this.audioPlayer.addEventListener('ended', () => {
                        URL.revokeObjectURL(audioUrl);
                    }, { once: true });

                } catch (error) {
                    console.error('Failed to play audio response:', error);
                }
            }

            addMessage(content, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                messageDiv.textContent = content;

                // Remove welcome message if it exists
                const welcomeMsg = this.chatMessages.querySelector('.welcome-message');
                if (welcomeMsg && sender === 'user') {
                    welcomeMsg.remove();
                }

                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addSystemMessage(content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message system';
                messageDiv.textContent = content;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            showTypingIndicator() {
                this.typingIndicator.style.display = 'flex';
                this.scrollToBottom();
            }

            hideTypingIndicator() {
                this.typingIndicator.style.display = 'none';
            }

            scrollToBottom() {
                setTimeout(() => {
                    this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                }, 100);
            }
        }

        // Initialize the chat when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ZionChat();
        });
    </script>
</body>
</html>
