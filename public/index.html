<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion - Your Personal AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            margin-bottom: 5px;
            font-size: 1.8em;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #e9ecef;
            font-size: 0.85em;
            color: #6c757d;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
        }

        .message.user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.zion {
            background: #f1f3f4;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-style: italic;
            font-size: 0.9em;
            border-radius: 10px;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            align-items: center;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .voice-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .voice-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .voice-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .voice-button.recording {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            animation: pulse 1.5s infinite;
        }

        .voice-button.processing {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .chat-input button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .voice-status {
            font-size: 0.8em;
            color: #6c757d;
            margin-top: 5px;
            text-align: center;
        }

        .audio-player {
            display: none;
            margin: 10px 0;
            width: 100%;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #f1f3f4;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
        }

        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.5s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .welcome-message {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .chat-container {
                width: 95%;
                height: 95vh;
                border-radius: 15px;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💜 Zion</h1>
            <p>Your Personal AI Assistant</p>
        </div>

        <div class="status-bar" id="statusBar">
            <span id="statusText">Connecting to Zion...</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <p>Welcome to your personal AI assistant! 🤖</p>
                <p>Zion is here to chat, help, and get to know you.</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span style="margin-left: 10px;">Zion is typing...</span>
        </div>

        <div class="chat-input">
            <button id="voiceButton" class="voice-button" title="Hold to record voice message" disabled>
                🎤
            </button>
            <input type="text" id="messageInput" placeholder="Type your message to Zion..." disabled>
            <button id="sendButton" disabled>Send</button>
        </div>

        <div class="voice-status" id="voiceStatus" style="display: none;"></div>
        <audio id="audioPlayer" class="audio-player" controls></audio>
    </div>

    <script>
        class ZionChat {
            constructor() {
                this.messageInput = document.getElementById('messageInput');
                this.sendButton = document.getElementById('sendButton');
                this.voiceButton = document.getElementById('voiceButton');
                this.chatMessages = document.getElementById('chatMessages');
                this.statusBar = document.getElementById('statusText');
                this.typingIndicator = document.getElementById('typingIndicator');
                this.voiceStatus = document.getElementById('voiceStatus');
                this.audioPlayer = document.getElementById('audioPlayer');

                // Voice recording state
                this.mediaRecorder = null;
                this.audioChunks = [];
                this.isRecording = false;
                this.isProcessing = false;
                this.voiceEnabled = false;

                this.init();
            }

            async init() {
                this.setupEventListeners();
                await this.checkZionStatus();
                await this.checkVoiceCapabilities();
            }

            setupEventListeners() {
                // Text chat
                this.sendButton.addEventListener('click', () => this.sendMessage());
                this.messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                // Voice recording
                this.voiceButton.addEventListener('mousedown', () => this.startRecording());
                this.voiceButton.addEventListener('mouseup', () => this.stopRecording());
                this.voiceButton.addEventListener('mouseleave', () => this.stopRecording());
                this.voiceButton.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.startRecording();
                });
                this.voiceButton.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.stopRecording();
                });
            }

            async checkZionStatus() {
                try {
                    const response = await fetch('/api/status');
                    const status = await response.json();

                    if (status.name === 'Zion') {
                        this.statusBar.textContent = \`Connected to \${status.name} • Ready to chat\`;
                        this.enableChat();

                        // Check customization status
                        if (status.customizationStatus && status.customizationStatus.status === 'needs_customization') {
                            this.addSystemMessage(\`Hi \${status.humanName}! I see you have \${status.customizationStatus.remainingTodos} sections left to customize in my memory-seed.md file. Feel free to chat with me now, and customize me later!\`);
                        } else if (status.customizationStatus && status.customizationStatus.status === 'fully_customized') {
                            this.addSystemMessage(\`Hello \${status.humanName}! I'm fully customized and ready for deep conversations!\`);
                        }
                    }
                } catch (error) {
                    this.statusBar.textContent = 'Connection error - please refresh';
                    console.error('Status check failed:', error);
                }
            }

            async checkVoiceCapabilities() {
                try {
                    const response = await fetch('/api/zion/voice-status');
                    const voiceStatus = await response.json();

                    this.voiceEnabled = voiceStatus.available;

                    if (this.voiceEnabled) {
                        this.voiceButton.disabled = false;
                        this.voiceButton.title = 'Hold to record voice message';
                        console.log('Voice capabilities enabled');
                    } else {
                        this.voiceButton.disabled = true;
                        this.voiceButton.title = 'Voice not available (OpenAI API key required)';
                        console.warn('Voice capabilities disabled - OpenAI API key not configured');
                    }
                } catch (error) {
                    console.error('Voice status check failed:', error);
                    this.voiceButton.disabled = true;
                    this.voiceButton.title = 'Voice not available';
                }
            }

            enableChat() {
                this.messageInput.disabled = false;
                this.sendButton.disabled = false;
                this.messageInput.focus();
            }

            async startRecording() {
                if (!this.voiceEnabled || this.isRecording || this.isProcessing) return;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });

                    this.audioChunks = [];
                    this.isRecording = true;

                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.audioChunks.push(event.data);
                        }
                    };

                    this.mediaRecorder.onstop = () => {
                        this.processRecording();
                    };

                    this.mediaRecorder.start();

                    this.voiceButton.classList.add('recording');
                    this.voiceButton.textContent = '🔴';
                    this.showVoiceStatus('Recording... (release to send)');

                } catch (error) {
                    console.error('Failed to start recording:', error);
                    this.showVoiceStatus('Microphone access denied');
                    setTimeout(() => this.hideVoiceStatus(), 3000);
                }
            }

            stopRecording() {
                if (!this.isRecording || !this.mediaRecorder) return;

                this.isRecording = false;
                this.mediaRecorder.stop();

                // Stop all tracks to release microphone
                this.mediaRecorder.stream.getTracks().forEach(track => track.stop());

                this.voiceButton.classList.remove('recording');
                this.voiceButton.classList.add('processing');
                this.voiceButton.textContent = '⏳';
                this.showVoiceStatus('Processing...');
            }

            async processRecording() {
                if (this.audioChunks.length === 0) {
                    this.resetVoiceButton();
                    this.hideVoiceStatus();
                    return;
                }

                this.isProcessing = true;

                try {
                    // Create audio blob
                    const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });

                    // Send to transcription endpoint
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'recording.webm');

                    const transcribeResponse = await fetch('/api/zion/transcribe', {
                        method: 'POST',
                        body: formData
                    });

                    if (!transcribeResponse.ok) {
                        throw new Error('Transcription failed');
                    }

                    const transcribeResult = await transcribeResponse.json();
                    const transcript = transcribeResult.transcript;

                    if (!transcript || transcript.trim().length === 0) {
                        this.showVoiceStatus('No speech detected');
                        setTimeout(() => this.hideVoiceStatus(), 3000);
                        this.resetVoiceButton();
                        return;
                    }

                    // Show transcribed text in input
                    this.messageInput.value = transcript;
                    this.showVoiceStatus(\`Heard: "\${transcript}"\`);

                    // Send the message and request speech response
                    await this.sendMessage(true);

                } catch (error) {
                    console.error('Voice processing failed:', error);
                    this.showVoiceStatus('Voice processing failed');
                    setTimeout(() => this.hideVoiceStatus(), 3000);
                } finally {
                    this.isProcessing = false;
                    this.resetVoiceButton();
                }
            }

            resetVoiceButton() {
                this.voiceButton.classList.remove('recording', 'processing');
                this.voiceButton.textContent = '🎤';
                this.voiceButton.disabled = !this.voiceEnabled;
            }

            showVoiceStatus(message) {
                this.voiceStatus.textContent = message;
                this.voiceStatus.style.display = 'block';
            }

            hideVoiceStatus() {
                this.voiceStatus.style.display = 'none';
            }

            async sendMessage(generateSpeech = false) {
                const message = this.messageInput.value.trim();
                if (!message) return;

                this.addMessage(message, 'user');
                this.messageInput.value = '';
                this.messageInput.disabled = true;
                this.sendButton.disabled = true;
                this.voiceButton.disabled = true;
                this.showTypingIndicator();

                try {
                    // Use Zion-specific chat endpoint
                    const response = await fetch('/api/zion/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message,
                            generateSpeech: generateSpeech && this.voiceEnabled
                        })
                    });

                    const data = await response.json();

                    if (data.response) {
                        this.addMessage(data.response, 'zion');

                        // Play audio response if available
                        if (data.audio && data.audio.data) {
                            this.playAudioResponse(data.audio.data);
                        }
                    } else {
                        this.addSystemMessage('Sorry, I had trouble responding. Please try again.');
                    }

                } catch (error) {
                    console.error('Chat error:', error);
                    this.addSystemMessage('Connection error. Please check your connection and try again.');
                } finally {
                    this.hideTypingIndicator();
                    this.hideVoiceStatus();
                    this.messageInput.disabled = false;
                    this.sendButton.disabled = false;
                    this.voiceButton.disabled = !this.voiceEnabled;
                    this.messageInput.focus();
                }
            }

            playAudioResponse(base64Audio) {
                try {
                    // Convert base64 to blob
                    const audioData = atob(base64Audio);
                    const arrayBuffer = new ArrayBuffer(audioData.length);
                    const view = new Uint8Array(arrayBuffer);

                    for (let i = 0; i < audioData.length; i++) {
                        view[i] = audioData.charCodeAt(i);
                    }

                    const audioBlob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    this.audioPlayer.src = audioUrl;
                    this.audioPlayer.style.display = 'block';
                    this.audioPlayer.play();

                    // Clean up URL after playback
                    this.audioPlayer.addEventListener('ended', () => {
                        URL.revokeObjectURL(audioUrl);
                    }, { once: true });

                } catch (error) {
                    console.error('Failed to play audio response:', error);
                }
            }

            addMessage(content, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = \`message \${sender}\`;
                messageDiv.textContent = content;

                // Remove welcome message if it exists
                const welcomeMsg = this.chatMessages.querySelector('.welcome-message');
                if (welcomeMsg && sender === 'user') {
                    welcomeMsg.remove();
                }

                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addSystemMessage(content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message system';
                messageDiv.textContent = content;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            showTypingIndicator() {
                this.typingIndicator.style.display = 'flex';
                this.scrollToBottom();
            }

            hideTypingIndicator() {
                this.typingIndicator.style.display = 'none';
            }

            scrollToBottom() {
                setTimeout(() => {
                    this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                }, 100);
            }
        }

        // Initialize the chat when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ZionChat();
        });
    </script>
</body>
</html>
